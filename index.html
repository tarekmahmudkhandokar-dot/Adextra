<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PP Coin – Adexora Rewarded Ad (ID: 1884)</title>

  <!-- Telegram Web App SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Adexora SDK with your App ID 1884 -->
  <script src="https://adexora.com/cdn/ads.js?id=1884" async></script>

  <style>
    body {
      background: #0f172a;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
      margin: 0;
    }
    .card {
      background: #020617;
      border-radius: 14px;
      padding: 20px;
      margin: 20px auto;
      max-width: 400px;
    }
    button {
      background: #22c55e;
      color: #000;
      border: none;
      padding: 16px 32px;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      margin: 10px;
    }
    button:active { opacity: 0.85; }
    #status {
      margin-top: 20px;
      font-size: 16px;
      color: #fbbf24;
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>Adexora Rewarded Ad (App ID: 1884)</h2>
    <p>Watch full ad → Earn +100 PP Coin (or your reward)</p>

    <button onclick="showAdexoraAd()">Watch Ad & Get Reward</button>

    <div id="status">Ready to show ad...</div>
  </div>

  <script>
    // Telegram Mini App initialization
    document.addEventListener("DOMContentLoaded", () => {
      if (window.Telegram?.WebApp) {
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();
        Telegram.WebApp.enableClosingConfirmation(); // Optional: prevent accidental close
      }
    });

    // Function to show Adexora rewarded ad
    function showAdexoraAd() {
      const status = document.getElementById("status");
      status.textContent = "Loading rewarded ad... Please wait.";

      if (typeof window.showAdexora !== "function") {
        status.textContent = "Adexora SDK not loaded. Refresh or check connection.";
        console.error("Adexora SDK not ready");
        return;
      }

      window.showAdexora()
        .then(() => {
          // Ad successfully completed → Grant reward
          status.textContent = "Ad watched successfully! +100 PP Coin added 🎉";
          console.log("Reward granted!");

          // তোমার actual logic এখানে যোগ করো
          // Example: addUserCoins(100); updateBalanceDisplay(); showToast("Coins added!");
          // অথবা backend API call: fetch('/api/reward', { method: 'POST', body: JSON.stringify({ userId: Telegram.WebApp.initDataUnsafe.user.id, amount: 100 }) });
        })
        .catch(error => {
          // Ad failed, skipped, or error
          status.textContent = "Ad not completed or error occurred. No reward.";
          console.error("Adexora ad error:", error);
        });
    }
  </script>

</body>
</html>
